name: Build OpenHarmony arm64

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 0.8.53). Leave empty to read from Cargo.toml."
        required: false
        default: ""

jobs:
  build:
    name: Build aarch64-unknown-linux-ohos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Rustup Adds Target
        run: rustup target add aarch64-unknown-linux-ohos

      - name: Setup OpenHarmony SDK
        uses: Boshen/setup-ohos-sdk@edb865a89a712f1f15dbad932dfa9cfce849d95c # v1.0.0

      - name: Determine version
        id: meta
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(awk '/^\[workspace\.package\]/{found=1} found && /^version = "/{gsub(/"/,""); print $3; exit}' Cargo.toml)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Configure cross-compilation linker
        run: |
          mkdir -p .cargo
          CLANG="${OHOS_NDK_HOME}/llvm/bin/clang"
          echo "[target.aarch64-unknown-linux-ohos]" > .cargo/config.toml
          echo "linker = \"${CLANG}\"" >> .cargo/config.toml
          echo "Linker: ${CLANG}"
          ls -la "${CLANG}" || echo "WARNING: linker not found"
          # 拷贝 toolchain 文件到 /tmp 供 cmake 使用
          cp cmake/ohos-toolchain.cmake /tmp/ohos-toolchain.cmake

      - name: Fetch dependencies
        run: |
          # 先触发依赖下载，然后才能 patch 源码
          cargo fetch --target aarch64-unknown-linux-ohos

      - name: Patch sources for OpenHarmony
        run: |
          chmod +x scripts/patch-ohos.sh
          bash scripts/patch-ohos.sh

      - name: Build release binaries
        env:
          AWS_LC_SYS_NO_ASM: "1"
          CARGO_BUILD_JOBS: "4"
          TARGET_CC: clang
          CFLAGS: "--sysroot=${OHOS_NDK_HOME}/sysroot --target=aarch64-linux-ohos -D__MUSL__"
          CXXFLAGS: "--sysroot=${OHOS_NDK_HOME}/sysroot --target=aarch64-linux-ohos -D__MUSL__"
          CMAKE_TOOLCHAIN_FILE: "/tmp/ohos-toolchain.cmake"
        run: |
          cargo build --release --target aarch64-unknown-linux-ohos

      - name: Package distribution
        id: package
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DIST_NAME="codewhale-${VERSION}-ohos-arm64"
          TARGET_DIR="target/aarch64-unknown-linux-ohos/release"

          mkdir -p "/tmp/${DIST_NAME}/bin"
          cp "${TARGET_DIR}/codewhale" "/tmp/${DIST_NAME}/bin/"
          cp "${TARGET_DIR}/codewhale-tui" "/tmp/${DIST_NAME}/bin/"
          cp LICENSE "/tmp/${DIST_NAME}/" 2>/dev/null || true
          cp README.md "/tmp/${DIST_NAME}/" 2>/dev/null || true

          cd /tmp
          tar czf "${DIST_NAME}.tar.gz" -C "${DIST_NAME}" .
          SHA256=$(sha256sum "${DIST_NAME}.tar.gz" | awk '{print $1}')

          cp "${DIST_NAME}.tar.gz" "${GITHUB_WORKSPACE}/"
          echo "dist_name=${DIST_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "ohos-${{ steps.meta.outputs.version }}"
          name: "CodeWhale ${{ steps.meta.outputs.version }} (OpenHarmony arm64)"
          body: |
            CodeWhale `${{ steps.meta.outputs.version }}` built for **OpenHarmony arm64** (target: `aarch64-unknown-linux-ohos`).

            **SHA256:** `${{ steps.package.outputs.sha256 }}`

            ## Install via Homebrew tap
            ```sh
            brew tap social4hyq/codewhale https://atomgit.com/social4hyq/homebrew-codewhale.git
            brew install codewhale
            ```
          files: |
            ${{ steps.package.outputs.dist_name }}.tar.gz
